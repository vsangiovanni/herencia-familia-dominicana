  <text x="1226" y="760" class="tiny red">María Magdalena</text>
  <text x="1608" y="760" class="tiny red">Paolo / Vincenzo</text>
  <text x="1228" y="990" class="tiny">Alessandro</text>
  <text x="1556" y="990" class="tiny">Generaciones actuales</text>
</svg>
