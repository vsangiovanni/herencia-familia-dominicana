  <text x="676" y="940" class="small">Nuevo hogar, nuevas generaciones.</text>

  <!-- Panel 6: genealogy -->
  <text x="1226" y="562" class="subtitle">EL ÁRBOL FAMILIAR CRECE</text>
  <text x="1226" y="602" class="title red">CON NOMBRES</text>
  <text x="1226" y="640" class="title red">REALES.</text>
