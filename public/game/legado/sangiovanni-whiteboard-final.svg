<svg xmlns="http://www.w3.org/2000/svg" width="1792" height="1024" viewBox="0 0 1792 1024">
  <defs>
    <style>
      .paper { fill: #f7f2e8; }
      .ink { stroke: #151515; stroke-width: 4.2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .ink-thin { stroke: #151515; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .red { fill: #a42222; }
      .red-stroke { stroke: #a42222; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke-dasharray: 12 10; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 900; letter-spacing: 1px; fill: #151515; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 25px; font-weight: 800; fill: #151515; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 700; fill: #151515; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #151515; }
      .panel { fill: rgba(255,255,255,0.23); stroke: #151515; stroke-width: 5; }
      .shadow { filter: drop-shadow(4px 5px 0 rgba(0,0,0,.12)); }
    </style>
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a42222"/>
    </marker>
  </defs>

  <rect class="paper" width="1792" height="1024"/>
  <rect width="1792" height="1024" filter="url(#paperNoise)" opacity=".55"/>
  <rect x="10" y="10" width="1772" height="1004" fill="none" stroke="#151515" stroke-width="6"/>

  <rect class="panel" x="24" y="24" width="568" height="464"/>
  <rect class="panel" x="612" y="24" width="568" height="464"/>
  <rect class="panel" x="1200" y="24" width="568" height="464"/>
  <rect class="panel" x="24" y="512" width="568" height="488"/>
  <rect class="panel" x="612" y="512" width="568" height="488"/>
  <rect class="panel" x="1200" y="512" width="568" height="488"/>

